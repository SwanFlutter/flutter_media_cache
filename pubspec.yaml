name: flutter_media_cache
description: "A powerful Flutter package for caching images and videos with customizable expiration time and automatic cache management."
version: 3.0.0
homepage: https://github.com/SwanFlutter/flutter_media_cache
repository: https://github.com/SwanFlutter/flutter_media_cache
issue_tracker: https://github.com/SwanFlutter/flutter_media_cache/issues

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
    # HTTP
  http: ^1.6.0

  # Crypto (SHA-256 cache keys)
  crypto: ^3.0.7

  # File system paths
  path_provider_master: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3

flutter:
