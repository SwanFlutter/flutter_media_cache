name: flutter_media_cache
description: >
  Production-grade Flutter media caching library with LRU eviction,
  priority download queue, deduplication, retry logic, progress streams,
  and conditional HTTP GET (ETag / Last-Modified) support.
version: 2.0.0
homepage: https://github.com/SwanFlutter/flutter_media_cache
repository: https://github.com/SwanFlutter/flutter_media_cache
issue_tracker: https://github.com/SwanFlutter/flutter_media_cache/issues

environment:
  sdk: ^3.12.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
    # HTTP
  http: ^1.6.0

  # Crypto (SHA-256 cache keys)
  crypto: ^3.0.7

  # File system paths
  path_provider_master: ^1.0.0

  # Video playback
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
